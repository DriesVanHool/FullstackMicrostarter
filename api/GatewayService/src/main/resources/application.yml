server:
  port: 8080

spring:
  application:
    name: GatewayService
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:${KEYCLOAK_BASE_URL:http://localhost:9090}/realms/${KEYCLOAK_REALM:starter-dev}}
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: user-service
              uri: http://${USER_SERVICE_HOST:localhost}:${USER_SERVICE_PORT:8081}
              predicates:
                - Path=/api/users,/api/users/**,/api/admin/users,/api/admin/users/**
              filters:
                - StripPrefix=1

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:5174}
    allowed-methods: ${APP_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS,HEAD}
    allowed-headers: ${APP_CORS_ALLOWED_HEADERS:Authorization,Content-Type,Accept,Origin,X-Requested-With}
    exposed-headers: ${APP_CORS_EXPOSED_HEADERS:Location}
    allow-credentials: ${APP_CORS_ALLOW_CREDENTIALS:true}
